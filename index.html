<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subida Azul | Azure Ascent</title>
    <meta name="description"
        content="Um jogo de escalada infinita desafiador e visualmente deslumbrante. Suba o mais alto que puder!">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #0f172a;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-glow: rgba(0, 210, 255, 0.5);
            --charge-color: #fbbf24;
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            transition: background-color 1s ease;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: all 1s ease;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .score-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: color 0.5s ease, transform 0.3s ease;
            white-space: nowrap;
        }

        .charge-counter {
            color: var(--charge-color) !important;
            font-size: 1rem !important;
        }

        .pop {
            transform: scale(1.1);
        }

        .screen {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            max-width: 80%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px var(--accent-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .key {
            background: var(--glass);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid var(--glass-border);
            font-weight: bold;
            color: var(--primary);
            transition: color 0.5s ease;
        }

        #game-hint {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.7);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            z-index: 5;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <div class="score-box">PONTOS: <span id="score">0</span></div>
                <div class="score-box charge-counter" id="charge-box">PULOS: <span id="charges">10</span>/10</div>
            </div>
            <div class="score-box" id="highscore-box">RECORDE: <span id="highscore">0</span></div>
        </div>

        <div id="game-hint" class="hidden">
            <div class="controls-hint" style="opacity: 1; margin-top: 0; font-size: 1.1rem;">
                <span>Use <span class="key">←</span> <span class="key">→</span> ou <span class="key">A</span> <span
                        class="key">D</span> para mover. <br> <span class="key">Espaço</span> ou <span
                        class="key">Clique</span> para pulo duplo.</span>
            </div>
        </div>

        <div class="ui-overlay">
            <!-- Start Screen -->
            <div id="start-screen" class="screen">
                <h1 id="main-title">Azure Ascent</h1>
                <p>Suba até as estrelas. Não caia!</p>
                <button id="start-btn">JOGAR AGORA</button>
                <div class="controls-hint" style="flex-direction: column; gap: 10px; opacity: 0.9;">
                    <span><span class="key">←</span> <span class="key">→</span> ou <span class="key">A</span> <span
                            class="key">D</span> Movimento</span>
                    <span><span class="key">Espaço</span> ou <span class="key">Clique</span> Pulo Duplo</span>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen hidden">
                <h1>Fim de Jogo!</h1>
                <p>Sua altura final: <span id="final-score">0</span>m</p>
                <button id="restart-btn">TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Game Constants
        const GRAVITY = 0.4;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 0.8;
        const FRICTION = 0.9;
        const MAX_SPEED = 7;
        let VIEWPORT_WIDTH = 500;
        let VIEWPORT_HEIGHT = 800;

        // Visual Levels (Colors)
        const COLOR_LEVELS = [
            { score: 0, primary: '#00d2ff', secondary: '#3a7bd5', bg: '#0f172a' },      // Azul (Default)
            { score: 5000, primary: '#f9d423', secondary: '#ff4e50', bg: '#2a0f0f' },   // Amarelo/Vermelho
            { score: 10000, primary: '#a8ff78', secondary: '#08ffc8', bg: '#0f2a1a' },  // Verde/Ciano
            { score: 15000, primary: '#ee9ca7', secondary: '#ffdde1', bg: '#2a0f25' },  // Rosa/Branco
            { score: 20000, primary: '#8e44ad', secondary: '#c0392b', bg: '#1a0f2a' },  // Roxo/Vinho
            { score: 25000, primary: '#000000', secondary: '#ffffff', bg: '#000000' }   // Monocromático Final
        ];

        // Game State
        let gameState = 'START';
        let score = 0;
        let highscore = localStorage.getItem('azureAscentHighscore') || 0;
        highscoreEl.innerText = highscore;
        let currentLevelIndex = 0;

        let player = {
            x: 0,
            y: 0,
            width: 30,
            height: 30,
            vx: 0,
            vy: 0,
            doubleJumpCharges: 10,
            maxCharges: 10,
            lastRefillScore: 0,
            canDoubleJump: true,
            color: '#00d2ff',
            trail: []
        };

        let platforms = [];
        let cameraY = 0;
        let keys = {};
        let playerMoved = false;

        // Initialization
        function init() {
            resize();
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            VIEWPORT_WIDTH = canvas.width;
            VIEWPORT_HEIGHT = canvas.height;
        }

        window.addEventListener('resize', resize);

        function resetGame() {
            player.x = VIEWPORT_WIDTH / 2 - player.width / 2;
            player.y = VIEWPORT_HEIGHT - 100;
            player.vx = 0;
            player.vy = JUMP_FORCE;
            player.doubleJumpCharges = 10;
            player.lastRefillScore = 0;
            player.canDoubleJump = true;
            player.trail = [];
            updateChargeHUD();
            player.color = COLOR_LEVELS[0].primary;

            cameraY = 0;
            score = 0;
            updateScore(0);
            currentLevelIndex = 0;
            updateColors(0);

            playerMoved = false;
            document.getElementById('game-hint').classList.remove('hidden');
            document.getElementById('game-hint').style.opacity = '1';

            platforms = [];
            platforms.push({
                x: VIEWPORT_WIDTH / 2 - 50,
                y: VIEWPORT_HEIGHT - 50,
                width: 100,
                height: 15,
                color: COLOR_LEVELS[0].secondary
            });

            generateInitialPlatforms();
        }

        function updateColors(currentScore) {
            let levelIndex = 0;
            for (let i = COLOR_LEVELS.length - 1; i >= 0; i--) {
                if (currentScore >= COLOR_LEVELS[i].score) {
                    levelIndex = i;
                    break;
                }
            }

            if (levelIndex !== currentLevelIndex) {
                currentLevelIndex = levelIndex;
                const colors = COLOR_LEVELS[levelIndex];

                // Visual Flash on level up
                showScreenFlash('rgba(255, 255, 255, 0.3)');

                // Update CSS Variables
                document.documentElement.style.setProperty('--primary', colors.primary);
                document.documentElement.style.setProperty('--secondary', colors.secondary);
                document.documentElement.style.setProperty('--bg-dark', colors.bg);
                document.documentElement.style.setProperty('--accent-glow', colors.primary + '80');

                player.color = colors.primary;

                // Update existing platforms colors
                platforms.forEach(p => p.color = colors.secondary);

                const container = document.getElementById('game-container');
                container.style.background = `linear-gradient(to bottom, #1e293b, ${colors.bg})`;
            }
        }

        function generateInitialPlatforms() {
            let nextY = VIEWPORT_HEIGHT - 150;
            while (nextY > -500) {
                createPlatformAtY(nextY);
                nextY -= Math.random() * 80 + 100;
            }
        }

        function createPlatformAtY(y) {
            // DIFFICULTY PROGRESSION
            const pColors = COLOR_LEVELS[currentLevelIndex];

            // 2. Distance increase (every 10000)
            const distanceTier = Math.min(3, Math.floor(score / 10000));
            // BASE JUMP is ~180. DOUBLE JUMP is ~320.
            const gapMin = 80 + (distanceTier * 20);
            const gapMax = 120 + (distanceTier * 30);

            // 3. Width decrease (every 20000)
            const widthTier = Math.min(3, Math.floor(score / 20000));
            const minWidth = Math.max(35, 65 - (widthTier * 10));
            const maxWidth = Math.max(55, 110 - (widthTier * 15));
            const width = Math.random() * (maxWidth - minWidth) + minWidth;

            platforms.push({
                x: Math.random() * (VIEWPORT_WIDTH - width),
                y: y,
                width: width,
                height: 15,
                color: pColors.secondary
            });
        }

        // Input Handling
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if ((e.key === ' ' || e.code === 'Space') && gameState === 'PLAYING') {
                performDoubleJump();
                e.preventDefault();
            }
        });

        canvas.addEventListener('mousedown', e => {
            if (gameState === 'PLAYING') performDoubleJump();
        });

        canvas.addEventListener('touchstart', e => {
            if (gameState === 'PLAYING') {
                performDoubleJump();
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('keyup', e => keys[e.code] = false);

        function performDoubleJump() {
            if (player.doubleJumpCharges > 0 && player.canDoubleJump) {
                player.vy = JUMP_FORCE;
                player.doubleJumpCharges--;
                player.canDoubleJump = false;
                playerMoved = true;

                updateChargeHUD();
                createJumpEffect(player.x + player.width / 2, player.y + player.height);

                const originalColor = player.color;
                player.color = '#ffffff';
                setTimeout(() => player.color = originalColor, 100);
            }
        }

        function refillCharges() {
            player.doubleJumpCharges = player.maxCharges;
            updateChargeHUD();
            showScreenFlash('rgba(251, 191, 36, 0.4)'); // Yellow refill flash
            const cb = document.getElementById('charge-box');
            cb.classList.add('pop');
            setTimeout(() => cb.classList.remove('pop'), 300);
        }

        function updateChargeHUD() {
            const chargesEl = document.getElementById('charges');
            if (chargesEl) chargesEl.innerText = player.doubleJumpCharges;
        }

        function showScreenFlash(color) {
            const container = document.getElementById('game-container');
            const flash = document.createElement('div');
            flash.style.position = 'absolute';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = color;
            flash.style.pointerEvents = 'none';
            flash.style.zIndex = '100';
            flash.style.transition = 'opacity 0.4s ease';
            container.appendChild(flash);
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => {
                    if (flash.parentNode) container.removeChild(flash);
                }, 400);
            }, 50);
        }

        function createJumpEffect(x, y) {
            player.trail.unshift({ x: x - player.width / 2, y: y, opacity: 2, scale: 1.5 });
        }

        startBtn.addEventListener('click', () => {
            gameState = 'PLAYING';
            startScreen.classList.add('hidden');
        });

        restartBtn.addEventListener('click', () => {
            resetGame();
            gameState = 'PLAYING';
            gameOverScreen.classList.add('hidden');
        });

        function update() {
            if (gameState !== 'PLAYING') return;

            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx -= MOVE_SPEED;
                playerMoved = true;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx += MOVE_SPEED;
                playerMoved = true;
            } else {
                player.vx *= FRICTION;
            }

            if (playerMoved) {
                const hint = document.getElementById('game-hint');
                hint.style.opacity = '0';
                setTimeout(() => hint.classList.add('hidden'), 500);
            }

            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.x += player.vx;

            if (player.x + player.width < 0) player.x = VIEWPORT_WIDTH;
            if (player.x > VIEWPORT_WIDTH) player.x = -player.width;

            player.vy += GRAVITY;
            player.y += player.vy;

            player.trail.unshift({ x: player.x, y: player.y, opacity: 1 });
            if (player.trail.length > 20) player.trail.pop();
            player.trail.forEach(t => t.opacity *= 0.85);

            if (player.vy > 0) {
                platforms.forEach(plat => {
                    if (
                        player.x + player.width > plat.x &&
                        player.x < plat.x + plat.width &&
                        player.y + player.height > plat.y &&
                        player.y + player.height < plat.y + plat.height + player.vy
                    ) {
                        player.y = plat.y - player.height;
                        player.vy = JUMP_FORCE;
                        player.canDoubleJump = true;
                    }
                });
            }

            if (player.y < cameraY + VIEWPORT_HEIGHT * 0.4) {
                cameraY = player.y - VIEWPORT_HEIGHT * 0.4;
            }

            let currentScore = Math.floor(Math.abs(Math.min(0, player.y - (VIEWPORT_HEIGHT - 100))));
            if (currentScore > score) {
                updateScore(currentScore);
                updateColors(currentScore); // Check for color progression
            }

            platforms = platforms.filter(p => p.y < cameraY + VIEWPORT_HEIGHT + 100);

            const highestPlatY = platforms.length > 0 ? Math.min(...platforms.map(p => p.y)) : player.y;
            if (highestPlatY > cameraY - 200) {
                // Procedural gap calculation using current difficulty
                // Increased spacing to reduce "clutter" and increase difficulty
                const distanceTier = Math.min(3, Math.floor(score / 10000));
                const gap = 120 + (Math.random() * (60 + distanceTier * 20));
                createPlatformAtY(highestPlatY - gap);
            }

            if (player.y > cameraY + VIEWPORT_HEIGHT + 50) {
                endGame();
            }
        }

        function updateScore(s) {
            score = s;
            scoreEl.innerText = score;

            // Refill every 3000 points
            if (score - player.lastRefillScore >= 3000) {
                refillCharges();
                player.lastRefillScore = Math.floor(score / 3000) * 3000;
            }

            if (score > highscore) {
                highscore = score;
                highscoreEl.innerText = highscore;
                localStorage.setItem('azureAscentHighscore', highscore);
            }
        }

        function endGame() {
            gameState = 'GAMEOVER';
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();
            ctx.save();
            ctx.translate(0, -cameraY);

            platforms.forEach(plat => {
                ctx.fillStyle = plat.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = plat.color;
                const r = 8;
                ctx.beginPath();
                ctx.roundRect(plat.x, plat.y, plat.width, plat.height, r);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(plat.x + 5, plat.y + 2, plat.width - 10, 2);
            });

            player.trail.forEach(t => {
                ctx.fillStyle = `rgba(${hexToRgb(player.color)}, ${t.opacity})`;
                ctx.fillRect(t.x, t.y, player.width, player.height);
            });

            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 6);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            const eyeSize = 4;
            const eyeOffset = 6;
            const eyeMove = player.vx * 0.5;
            ctx.fillRect(player.x + eyeOffset + eyeMove, player.y + 8, eyeSize, eyeSize);
            ctx.fillRect(player.x + player.width - eyeOffset - eyeSize + eyeMove, player.y + 8, eyeSize, eyeSize);

            ctx.restore();
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * 1000,
                y: Math.random() * 2000,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function drawStars() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                let sy = (star.y - cameraY * star.speed) % VIEWPORT_HEIGHT;
                if (sy < 0) sy += VIEWPORT_HEIGHT;
                ctx.globalAlpha = star.speed;
                ctx.beginPath();
                ctx.arc(star.x % VIEWPORT_WIDTH, sy, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subida Azul | Azure Ascent</title>
    <meta name="description" content="Um jogo de escalada infinita desafiador e visualmente deslumbrante. Suba o mais alto que puder!">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #0f172a;
            --text: #f8fafc;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .score-box {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .screen {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid var(--glass-border);
            pointer-events: auto;
            max-width: 80%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.8;
            font-size: 1.1rem;
        }

        button {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 210, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 210, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .hidden {
            display: none !important;
        }

        .controls-hint {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.6;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .key {
            background: var(--glass);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="hud">
            <div class="score-box">PONTOS: <span id="score">0</span></div>
            <div class="score-box" id="highscore-box">RECORDE: <span id="highscore">0</span></div>
        </div>

        <div class="ui-overlay">
            <!-- Start Screen -->
            <div id="start-screen" class="screen">
                <h1>Azure Ascent</h1>
                <p>Suba até as estrelas. Não caia!</p>
                <button id="start-btn">JOGAR AGORA</button>
                <div class="controls-hint">
                    <span><span class="key">←</span> <span class="key">→</span> ou <span class="key">A</span> <span class="key">D</span> Movimento</span>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="screen hidden">
                <h1>Fim de Jogo!</h1>
                <p>Sua altura final: <span id="final-score">0</span>m</p>
                <button id="restart-btn">TENTAR NOVAMENTE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highscoreEl = document.getElementById('highscore');
        const finalScoreEl = document.getElementById('final-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Game Constants
        const GRAVITY = 0.4;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 0.8;
        const FRICTION = 0.9;
        const MAX_SPEED = 7;
        let VIEWPORT_WIDTH = 500;
        let VIEWPORT_HEIGHT = 800;

        // Game State
        let gameState = 'START';
        let score = 0;
        let highscore = localStorage.getItem('azureAscentHighscore') || 0;
        highscoreEl.innerText = highscore;

        let player = {
            x: 0,
            y: 0,
            width: 30,
            height: 30,
            vx: 0,
            vy: 0,
            color: '#00d2ff',
            trail: []
        };

        let platforms = [];
        let cameraY = 0;
        let keys = {};

        // Initialization
        function init() {
            resize();
            resetGame();
            requestAnimationFrame(gameLoop);
        }

        function resize() {
            const container = document.getElementById('game-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            VIEWPORT_WIDTH = canvas.width;
            VIEWPORT_HEIGHT = canvas.height;
        }

        window.addEventListener('resize', resize);

        function resetGame() {
            player.x = VIEWPORT_WIDTH / 2 - player.width / 2;
            player.y = VIEWPORT_HEIGHT - 100;
            player.vx = 0;
            player.vy = JUMP_FORCE;
            player.trail = [];
            
            cameraY = 0;
            score = 0;
            updateScore(0);
            
            platforms = [];
            // Create starting platform
            platforms.push({
                x: VIEWPORT_WIDTH / 2 - 50,
                y: VIEWPORT_HEIGHT - 50,
                width: 100,
                height: 15,
                color: '#3a7bd5'
            });

            // Initial generation
            generateInitialPlatforms();
        }

        function generateInitialPlatforms() {
            let nextY = VIEWPORT_HEIGHT - 150;
            while (nextY > -500) {
                createPlatformAtY(nextY);
                nextY -= Math.random() * 80 + 100;
            }
        }

        function createPlatformAtY(y) {
            // Difficulty scaling
            const difficultyFactor = Math.min(score / 5000, 1);
            const minWidth = 60;
            const maxWidth = 120 - (40 * difficultyFactor);
            const width = Math.random() * (maxWidth - minWidth) + minWidth;
            
            platforms.push({
                x: Math.random() * (VIEWPORT_WIDTH - width),
                y: y,
                width: width,
                height: 15,
                color: difficultyFactor > 0.5 ? '#00d2ff' : '#3a7bd5'
            });
        }

        // Input Handling
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        startBtn.addEventListener('click', () => {
            gameState = 'PLAYING';
            startScreen.classList.add('hidden');
        });

        restartBtn.addEventListener('click', () => {
            resetGame();
            gameState = 'PLAYING';
            gameOverScreen.classList.add('hidden');
        });

        // Game Logic
        function update() {
            if (gameState !== 'PLAYING') return;

            // Horizontal Movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.vx -= MOVE_SPEED;
            } else if (keys['ArrowRight'] || keys['KeyD']) {
                player.vx += MOVE_SPEED;
            } else {
                player.vx *= FRICTION;
            }

            // Clamp horizontal speed
            player.vx = Math.max(-MAX_SPEED, Math.min(MAX_SPEED, player.vx));
            player.x += player.vx;

            // Screen Wrap
            if (player.x + player.width < 0) player.x = VIEWPORT_WIDTH;
            if (player.x > VIEWPORT_WIDTH) player.x = -player.width;

            // Vertical Physics
            player.vy += GRAVITY;
            player.y += player.vy;

            // Trail effect
            player.trail.unshift({x: player.x, y: player.y, opacity: 1});
            if (player.trail.length > 10) player.trail.pop();
            player.trail.forEach(t => t.opacity *= 0.8);

            // Platform Collisions (only when falling)
            if (player.vy > 0) {
                platforms.forEach(plat => {
                    if (
                        player.x + player.width > plat.x &&
                        player.x < plat.x + plat.width &&
                        player.y + player.height > plat.y &&
                        player.y + player.height < plat.y + plat.height + player.vy
                    ) {
                        player.y = plat.y - player.height;
                        player.vy = JUMP_FORCE;
                        
                        // Small bounce animation can be added here
                    }
                });
            }

            // Camera follow
            if (player.y < cameraY + VIEWPORT_HEIGHT * 0.4) {
                cameraY = player.y - VIEWPORT_HEIGHT * 0.4;
            }

            // Scaling score based on height
            let currentScore = Math.floor(Math.abs(Math.min(0, player.y - (VIEWPORT_HEIGHT - 100))));
            if (currentScore > score) {
                updateScore(currentScore);
            }

            // Generation and Cleanup
            // Remove old platforms
            platforms = platforms.filter(p => p.y < cameraY + VIEWPORT_HEIGHT + 100);

            // Add new platforms
            const highestPlatY = platforms.length > 0 ? Math.min(...platforms.map(p => p.y)) : player.y;
            if (highestPlatY > cameraY - 200) {
                // Determine vertical distance between platforms based on difficulty
                const difficultyFactor = Math.min(score / 5000, 1);
                const gapMin = 100;
                const gapMax = 150 + (100 * difficultyFactor);
                createPlatformAtY(highestPlatY - (Math.random() * (gapMax - gapMin) + gapMin));
            }

            // Game Over Check
            if (player.y > cameraY + VIEWPORT_HEIGHT + 50) {
                endGame();
            }
        }

        function updateScore(s) {
            score = s;
            scoreEl.innerText = score;
            if (score > highscore) {
                highscore = score;
                highscoreEl.innerText = highscore;
                localStorage.setItem('azureAscentHighscore', highscore);
            }
        }

        function endGame() {
            gameState = 'GAMEOVER';
            finalScoreEl.innerText = score;
            gameOverScreen.classList.remove('hidden');
        }

        // Rendering
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Background Stars (simple parallax)
            drawStars();

            ctx.save();
            ctx.translate(0, -cameraY);

            // Draw Platforms
            platforms.forEach(plat => {
                // Glass effect for platforms
                ctx.fillStyle = plat.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = plat.color;
                
                // Rounded rectangle platform
                const r = 8;
                ctx.beginPath();
                ctx.moveTo(plat.x + r, plat.y);
                ctx.lineTo(plat.x + plat.width - r, plat.y);
                ctx.quadraticCurveTo(plat.x + plat.width, plat.y, plat.x + plat.width, plat.y + r);
                ctx.lineTo(plat.x + plat.width, plat.y + plat.height - r);
                ctx.quadraticCurveTo(plat.x + plat.width, plat.y + plat.height, plat.x + plat.width - r, plat.y + plat.height);
                ctx.lineTo(plat.x + r, plat.y + plat.height);
                ctx.quadraticCurveTo(plat.x, plat.y + plat.height, plat.x, plat.y + plat.height - r);
                ctx.lineTo(plat.x, plat.y + r);
                ctx.quadraticCurveTo(plat.x, plat.y, plat.x + r, plat.y);
                ctx.closePath();
                ctx.fill();
                
                // Light streak on top
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(plat.x + 5, plat.y + 2, plat.width - 10, 2);
            });

            // Draw Trail
            player.trail.forEach(t => {
                ctx.fillStyle = `rgba(0, 210, 255, ${t.opacity})`;
                ctx.fillRect(t.x, t.y, player.width, player.height);
            });

            // Draw Player
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            // Player body (rounded square)
            const pr = 6;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, pr);
            ctx.fill();

            // Player "Face" (simple eyes)
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            const eyeSize = 4;
            const eyeOffset = 6;
            const eyeMove = player.vx * 0.5;
            ctx.fillRect(player.x + eyeOffset + eyeMove, player.y + 8, eyeSize, eyeSize);
            ctx.fillRect(player.x + player.width - eyeOffset - eyeSize + eyeMove, player.y + 8, eyeSize, eyeSize);

            ctx.restore();
        }

        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * 1000,
                y: Math.random() * 2000,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        function drawStars() {
            ctx.fillStyle = 'white';
            stars.forEach(star => {
                // Parallax effect based on cameraY
                let sy = (star.y - cameraY * star.speed) % VIEWPORT_HEIGHT;
                if (sy < 0) sy += VIEWPORT_HEIGHT;
                
                ctx.globalAlpha = star.speed;
                ctx.beginPath();
                ctx.arc(star.x % VIEWPORT_WIDTH, sy, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        init();
    </script>
</body>
</html>
